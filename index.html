<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Apna Dost</title>
  <style>
    body { font-family: sans-serif; max-width: 500px; margin: 30px auto; background:#f0f2f5; }
    #chatbox { background:white; height:400px; overflow-y:auto; padding:10px; border-radius:10px; }
    .msg { margin:8px 0; padding:8px 12px; border-radius:15px; max-width:70%; word-wrap: break-word; }
    .user { background:#dcf8c6; margin-left:auto; text-align:right; }
    .bot { background:#e6e6e6; }
    #inputArea { display:flex; margin-top:10px; }
    #userInput { flex:1; padding:10px; border-radius:20px; border:1px solid #ccc; }
    #sendBtn { padding:10px 20px; border:none; background:#25d366; color:white; border-radius:20px; margin-left:5px; cursor:pointer; }
  </style>
</head>
<body>
  <h2>🤖 Apna Dost</h2>
  <div id="chatbox"></div>
  <div id="inputArea">
    <input type="text" id="userInput" placeholder="Kuch bol bhai..." onkeydown="if(event.key==='Enter') sendMessage()">
    <button id="sendBtn" onclick="sendMessage()">Send</button>
  </div>

  <script>
    const sessionId = "user1";
    const BACKEND_URL = "http://localhost:8000"; // change after deploying
    const chatbox = document.getElementById("chatbox");

    function addMessage(text, sender) {
      const div = document.createElement("div");
      div.className = "msg " + sender;
      div.innerText = text;
      chatbox.appendChild(div);
      chatbox.scrollTop = chatbox.scrollHeight;
    }

    async function sendMessage() {
      const input = document.getElementById("userInput");
      const text = input.value.trim();
      if (!text) return;
      addMessage(text, "user");
      input.value = "";
      addMessage("...", "bot");

      try {
        const res = await fetch(BACKEND_URL + "/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ session_id: sessionId, message: text })
        });
        const data = await res.json();
        chatbox.removeChild(chatbox.lastChild);
        addMessage(data.reply, "bot");
      } catch (e) {
        chatbox.removeChild(chatbox.lastChild);
        addMessage("Error: backend not reachable", "bot");
      }
    }
  </script>
</body>
</html>
