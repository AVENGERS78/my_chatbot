<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Apna Dost</title>

<style>
body{
    font-family:sans-serif;
    max-width:600px;
    margin:30px auto;
    background:#f0f2f5;
}

h2{
    text-align:center;
}

#chatbox{
    background:white;
    height:500px;
    overflow-y:auto;
    padding:15px;
    border-radius:10px;
    border:1px solid #ddd;
}

.msg{
    margin:10px 0;
    padding:10px 14px;
    border-radius:15px;
    max-width:75%;
    word-wrap:break-word;
}

.user{
    background:#dcf8c6;
    margin-left:auto;
    text-align:right;
}

.bot{
    background:#e6e6e6;
}

#inputArea{
    display:flex;
    margin-top:10px;
}

#userInput{
    flex:1;
    padding:12px;
    border-radius:20px;
    border:1px solid #ccc;
}

#sendBtn{
    padding:12px 20px;
    border:none;
    background:#25d366;
    color:white;
    border-radius:20px;
    margin-left:5px;
    cursor:pointer;
}
</style>
</head>

<body>

<h2>🤖 Apna Dost</h2>

<div id="chatbox"></div>

<div id="inputArea">
<input
id="userInput"
type="text"
placeholder="Kuch bol bhai..."
onkeydown="if(event.key==='Enter') sendMessage()"
/>

<button id="sendBtn" onclick="sendMessage()">
Send
</button>
</div>

<script>

// ✅ FIX: Generate a unique session ID per browser
// Stored in localStorage so it survives page refresh
// Every user gets their own ID automatically — no login needed
function getSessionId() {
    let sessionId = localStorage.getItem("apna_dost_session_id");
    if (!sessionId) {
        sessionId = "sd_" + Math.random().toString(36).substring(2, 14);
        localStorage.setItem("apna_dost_session_id", sessionId);
    }
    return sessionId;
}

const sessionId = getSessionId(); // e.g. "sd_a3f9b2c1d4e5"

const BACKEND_URL =
"https://my-chatbot-de5t.onrender.com";

const chatbox = document.getElementById("chatbox");

function addMessage(text,sender){

const div=document.createElement("div");

div.className="msg "+sender;

div.innerText=text;

chatbox.appendChild(div);

chatbox.scrollTop=chatbox.scrollHeight;
}

async function sendMessage(){

const input=document.getElementById("userInput");

const text=input.value.trim();

if(!text) return;

addMessage(text,"user");

input.value="";

addMessage("Typing...","bot");

try{

const response=await fetch(
BACKEND_URL+"/chat",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
session_id:sessionId, // ✅ now unique per browser
message:text
})
}
);

const data=await response.json();

chatbox.removeChild(chatbox.lastChild);

addMessage(data.reply,"bot");

}
catch(error){

chatbox.removeChild(chatbox.lastChild);

addMessage(
"Backend connection failed",
"bot"
);

console.error(error);

}
}
</script>

</body>
</html>
